services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - sqlite_data:/data
      - storage_uploads:/var/www/html/storage/app/public
    env_file:
      - .env.docker
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env.docker
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  sqlite_data:
  storage_uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
